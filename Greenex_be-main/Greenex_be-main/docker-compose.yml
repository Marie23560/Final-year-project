services:
  db:
    image: postgres:16
    container_name: greenex-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: greenex_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: greenex-app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/greenex_db
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  db_data:
